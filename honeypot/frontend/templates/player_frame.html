<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Session {{ session_id }} stream</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #17130f;
      color: #f5ecd9;
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
    }
    body {
      display: grid;
    }
    .player-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #17130f;
    }
    .player-note {
      display: grid;
      place-items: center;
      padding: 1.5rem;
      text-align: center;
      color: rgba(245, 236, 217, 0.8);
    }
  </style>
</head>
<body>
  {% if has_player_url %}
  <iframe class="player-frame" src="{{ player_url }}"></iframe>
  {% else %}
  <div class="player-note">The frontend could not resolve a live player URL for session {{ session_id }} yet.</div>
  <script>
    window.setTimeout(() => window.location.replace(window.location.href), 1500);
  </script>
  {% endif %}
</body>
</html>
