[http]
bind_addr = "127.0.0.1:18080"

[auth]
service_token_validation_disabled = true

[backend_credentials]
adapter = "file"
file_path = "/srv/honeypot/secrets/backend-credentials.json"

[runtime]
enable_guest_agent = true
lifecycle_driver = "process"
stop_timeout_secs = 5

[runtime.limits]
max_vcpu_count = 8
max_memory_mib = 16384
max_overlay_size_mib = 65536
max_stop_timeout_secs = 15

[runtime.qemu]
binary_path = "/usr/bin/qemu-system-x86_64"
machine_type = "q35"
cpu_model = "host"
vcpu_count = 4
memory_mib = 8192
network.netdev_id = "net0"

[paths]
data_dir = "/srv/honeypot/control-plane"
image_store = "/srv/honeypot/images"
manifest_dir = "/srv/honeypot/images/manifests"
lease_store = "/srv/honeypot/leases"
quarantine_store = "/srv/honeypot/quarantine"
qmp_dir = "/srv/honeypot/qmp"
qga_dir = "/srv/honeypot/qga"
secret_dir = "/srv/honeypot/secrets"
kvm_path = "/dev/kvm"
